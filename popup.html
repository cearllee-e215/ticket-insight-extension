<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 300px;
      font-family: Averta, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-icon { font-size: 1.5em; }
    .header-title { font-size: 1.15em; font-weight: bold; }
    .header-version { font-size: 0.7em; opacity: 0.7; margin-left: auto; }
    .summary {
      background: white;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0;
    }
    .summary-label { color: #666; font-size: 0.9em; }
    .summary-value { font-weight: 600; font-size: 1em; }
    .summary-value.primary { color: #1a73e8; }
    .summary-value.resale { color: #e67e22; }
    .summary-value.total { color: #333; font-size: 1.1em; }
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 16px;
      border: 1px solid #ccc;
      background: white;
      color: #333;
      font-size: 0.82em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }
    .filter-btn:hover:not(.active) {
      background: #f0f0f0;
    }
    .sections-container {
      max-height: 350px;
      overflow-y: auto;
      padding: 0;
    }
    .section-row {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }
    .section-row:hover {
      background: #f8f8f8;
    }
    .section-name {
      font-weight: 600;
      color: #333;
      min-width: 65px;
      font-size: 0.9em;
    }
    .section-counts {
      flex: 1;
      margin-left: 10px;
    }
    .section-total-count {
      color: #555;
      font-size: 0.88em;
    }
    .section-breakdown {
      font-size: 0.75em;
      color: #999;
      margin-top: 1px;
    }
    .section-breakdown .p-label { color: #1a73e8; }
    .section-breakdown .r-label { color: #e67e22; }
    .section-price {
      font-weight: 600;
      color: #1a73e8;
      font-size: 0.92em;
      white-space: nowrap;
    }
    .no-data {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .no-data-icon { font-size: 2.5em; margin-bottom: 10px; }
    .no-data-text { font-size: 0.95em; }
    .no-data-sub { font-size: 0.8em; margin-top: 6px; color: #bbb; }
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
    .loading-spinner {
      border: 3px solid #e0e0e0;
      border-top: 3px solid #1a73e8;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">\u{1F3AB}</span>
    <span class="header-title">Ticket Insight</span>
    <span class="header-version">v1.1.0</span>
  </div>

  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <div>Loading ticket data...</div>
  </div>

  <div id="no-data" class="no-data" style="display:none;">
    <div class="no-data-icon">\u{1F3AB}</div>
    <div class="no-data-text">No ticket data available</div>
    <div class="no-data-sub">Navigate to a Ticketmaster event page to see inventory</div>
  </div>

  <div id="content" style="display:none;">
    <div class="summary" id="summary"></div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="sections-container" id="sections"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
