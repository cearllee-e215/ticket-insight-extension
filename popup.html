<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
            body { width: 420px; min-height: 300px; font-family: Averta, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
                .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 8px; }
                    .header-icon { font-size: 1.4em; }
                        .header-title { font-size: 1.1em; font-weight: bold; }
                            .header-version { font-size: 0.7em; opacity: 0.7; margin-left: auto; }
                                .summary { background: white; padding: 10px 16px; border-bottom: 1px solid #e0e0e0; }
                                    .summary-row { display: flex; justify-content: space-between; align-items: center; margin: 3px 0; }
                                        .summary-label { color: #666; font-size: 0.88em; }
                                            .summary-value { font-weight: 600; font-size: 0.95em; }
                                                .summary-value.primary { color: #1a73e8; }
                                                    .summary-value.resale { color: #e67e22; }
                                                        .summary-value.total { color: #333; font-size: 1.05em; }
                                                            .controls { background: #fafafa; padding: 8px 16px; border-bottom: 1px solid #e0e0e0; }
                                                                .search-box { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.88em; outline: none; transition: border-color 0.2s; }
                                                                    .search-box:focus { border-color: #1a73e8; }
                                                                        .controls-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
                                                                            .filter-bar { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
                                                                                .filter-btn { padding: 4px 12px; border-radius: 14px; border: 1px solid #ccc; background: white; color: #333; font-size: 0.8em; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
                                                                                    .filter-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
                                                                                        .filter-btn:hover:not(.active) { background: #f0f0f0; }
                                                                                            .sort-select { margin-left: auto; padding: 4px 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.8em; background: white; cursor: pointer; outline: none; }
                                                                                                .toggle-wrap { display: flex; align-items: center; gap: 5px; font-size: 0.8em; color: #666; margin-left: 6px; }
                                                                                                    .toggle-switch { position: relative; width: 32px; height: 18px; background: #ccc; border-radius: 9px; cursor: pointer; transition: background 0.2s; }
                                                                                                        .toggle-switch.on { background: #e67e22; }
                                                                                                            .toggle-switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: left 0.2s; }
                                                                                                                .toggle-switch.on::after { left: 16px; }
                                                                                                                    .sections-container { max-height: 380px; overflow-y: auto; padding: 0; }
                                                                                                                        .section-group-header { padding: 6px 16px; background: #e8f0fe; color: #1a73e8; font-weight: 700; font-size: 0.82em; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 1; }
                                                                                                                            .section-group-header.resale-header { background: #fef3e8; color: #e67e22; }
                                                                                                                                .section-row { display: flex; align-items: center; padding: 7px 16px; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
                                                                                                                                    .section-row:hover { background: #f8f8f8; }
                                                                                                                                        .section-name { font-weight: 600; color: #333; min-width: 62px; font-size: 0.88em; }
                                                                                                                                            .section-counts { flex: 1; margin-left: 8px; }
                                                                                                                                                .section-total-count { color: #555; font-size: 0.85em; }
                                                                                                                                                    .section-price-range { font-size: 0.73em; color: #888; margin-top: 1px; }
                                                                                                                                                        .section-price { font-weight: 700; font-size: 0.92em; white-space: nowrap; min-width: 60px; text-align: right; }
                                                                                                                                                            .section-price.primary-price { color: #1a73e8; }
                                                                                                                                                                .section-price.resale-price { color: #e67e22; }
                                                                                                                                                                    .copy-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #1a73e8; background: #1a73e8; color: white; font-size: 0.82em; cursor: pointer; font-weight: 600; transition: all 0.2s; margin: 8px 16px; }
                                                                                                                                                                        .copy-btn:hover { background: #1565c0; }
                                                                                                                                                                            .copy-btn.copied { background: #4caf50; border-color: #4caf50; }
                                                                                                                                                                                .no-data { text-align: center; padding: 40px 20px; color: #999; }
                                                                                                                                                                                    .no-data-icon { font-size: 2.5em; margin-bottom: 10px; }
                                                                                                                                                                                        .no-data-text { font-size: 0.95em; }
                                                                                                                                                                                            .no-data-sub { font-size: 0.8em; margin-top: 6px; color: #bbb; }
                                                                                                                                                                                                .loading { text-align: center; padding: 40px 20px; color: #666; }
                                                                                                                                                                                                    .loading-spinner { border: 3px solid #e0e0e0; border-top: 3px solid #1a73e8; border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
                                                                                                                                                                                                        @keyframes spin { to { transform: rotate(360deg); } }
                                                                                                                                                                                                            .no-results { padding: 20px; text-align: center; color: #999; font-size: 0.9em; }
                                                                                                                                                                                                              </style>
                                                                                                                                                                                                              </head>
                                                                                                                                                                                                              <body>
                                                                                                                                                                                                                <div class="header">
                                                                                                                                                                                                                    <span class="header-icon">&#127915;</span>
                                                                                                                                                                                                                        <span class="header-title">Ticket Insight</span>
                                                                                                                                                                                                                            <span class="header-version">v2.1</span>
                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                <div id="loading" class="loading">
                                                                                                                                                                                                                                    <div class="loading-spinner"></div>
                                                                                                                                                                                                                                        <div>Loading ticket data...</div>
                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                            <div id="no-data" class="no-data" style="display:none;">
                                                                                                                                                                                                                                                <div class="no-data-icon">&#127915;</div>
                                                                                                                                                                                                                                                    <div class="no-data-text">No ticket data available</div>
                                                                                                                                                                                                                                                        <div class="no-data-sub">Navigate to a Ticketmaster event page to see inventory</div>
                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                            <div id="content" style="display:none;">
                                                                                                                                                                                                                                                                <div class="summary" id="summary"></div>
                                                                                                                                                                                                                                                                    <div class="controls">
                                                                                                                                                                                                                                                                          <input type="text" class="search-box" id="search-box" placeholder="Search sections (e.g. 121, 300s, GA)...">
                                                                                                                                                                                                                                                                                <div class="controls-row">
                                                                                                                                                                                                                                                                                        <div id="filter-bar" class="filter-bar"></div>
                                                                                                                                                                                                                                                                                                <div class="toggle-wrap">
                                                                                                                                                                                                                                                                                                          <div class="toggle-switch" id="resale-toggle" title="Show resale tickets"></div>
                                                                                                                                                                                                                                                                                                                    <span>Resale</span>
                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                    <select class="sort-select" id="sort-select">
                                                                                                                                                                                                                                                                                                                                              <option value="section">Sort: Section</option>
                                                                                                                                                                                                                                                                                                                                                        <option value="price-asc">Sort: Price Low</option>
                                                                                                                                                                                                                                                                                                                                                                  <option value="price-desc">Sort: Price High</option>
                                                                                                                                                                                                                                                                                                                                                                            <option value="count-desc">Sort: Most Tix</option>
                                                                                                                                                                                                                                                                                                                                                                                      <option value="count-asc">Sort: Fewest Tix</option>
                                                                                                                                                                                                                                                                                                                                                                                              </select>
                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                            <div class="sections-container" id="sections"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                <button class="copy-btn" id="copy-btn">&#128203; Copy All Data</button>
                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                    <script src="popup.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
